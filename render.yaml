services:
  - type: web
    name: vai-radiology-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: vai-radiology-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false  # Set this manually to your Vercel URL
      - key: YOLO_MODEL_PATH
        value: yolov8n-seg.pt
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: vai-radiology-db
    databaseName: vai_radiology
    user: vai_radiology
